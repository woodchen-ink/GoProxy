services:
  goproxy:
    image: ghcr.io/woodchen-ink/goproxy:latest
    container_name: goproxy
    restart: unless-stopped
    ports:
      - "${STABLE_PORT:-7776}:${STABLE_PORT:-7776}" # http+socks5 最低延迟
      - "${RANDOM_PORT:-7777}:${RANDOM_PORT:-7777}" # http+socks5 随机轮换
      - "${WEBUI_PORT:-7778}:${WEBUI_PORT:-7778}" # Web UI 面板
    environment:
      - TZ=${TZ:-Asia/Shanghai} # 容器时区设置，默认使用上海时间
      - DATA_DIR=/app/data
      - STABLE_PORT=${STABLE_PORT:-7776}
      - RANDOM_PORT=${RANDOM_PORT:-7777}
      - WEBUI_PORT=${WEBUI_PORT:-7778}
      - WEBUI_PASSWORD=web密码
      - BLOCKED_COUNTRIES=CN,RU,HK
      - PROXY_AUTH_ENABLED=true
      - PROXY_AUTH_USERNAME=代理用户名
      - PROXY_AUTH_PASSWORD=代理密码
      - SOCKS5_DNS_MODE=local
      - SOCKS5_ALLOW_HTTP_UPSTREAM=true
      - QUAKE_ENABLED=${QUAKE_ENABLED:-false}
      - QUAKE_TOKEN=${QUAKE_TOKEN:-}
      - 'QUAKE_QUERY=${QUAKE_QUERY:-service:socks5 AND response:"No authentication" AND (country_cn:"德国" OR country_cn:"法国" OR country_cn:"意大利" OR country_cn:"美国")}'
      - QUAKE_RESULT_SIZE=${QUAKE_RESULT_SIZE:-10000}
    volumes:
      - goproxy-data:/app/data # 挂载数据卷，实现数据持久化

volumes:
  goproxy-data: # 声明命名数据卷
